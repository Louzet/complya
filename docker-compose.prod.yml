# ============================================================
# docker-compose.prod.yml — Override production
# Usage : docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Différences vs dev :
# - Build target : production (multi-stage, image Alpine minimale)
# - PostgreSQL local désactivé — DATABASE_URL pointe vers Neon prod
# - restart: always + resource limits
# - Healthchecks activés
# ============================================================

services:
  api:
    build:
      target: production
    restart: always
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      target: production
    restart: always
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL local désactivé en prod — Neon uniquement
  postgres:
    profiles:
      - disabled
